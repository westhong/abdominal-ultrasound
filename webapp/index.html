<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>腹腔超音波報告 v3</title>
<style>
:root{
  --teal:#7A9BAE;--teal-light:#EAF0F4;--teal-mid:#8AAFC0;
  --gray:#6A6A68;--gray-light:#F0EDE8;--border:#D4CEC8;
  --text:#2C2C2A;--text-muted:#8A8680;--red:#A06060;
}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Noto Sans TC','PingFang TC','Microsoft JhengHei',sans-serif;background:#F2EDE8;color:var(--text)}
@media print{.screen-only{display:none!important}}

/* TOP BAR */
.top-bar{background:var(--teal);color:#fff;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:200}
.top-bar h1{font-size:15px;font-weight:500;letter-spacing:.04em}
.top-bar-btns{display:flex;gap:8px}
.btn{padding:7px 18px;border-radius:6px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid rgba(255,255,255,.4);background:rgba(255,255,255,.15);color:#fff;transition:background .15s}
.btn:hover{background:rgba(255,255,255,.28)}
.btn-save{background:rgba(255,255,255,.22);border-color:rgba(255,255,255,.5)}
.btn-save:hover{background:rgba(255,255,255,.35)}
.btn-print{background:#fff;color:var(--teal);border-color:#fff}
.btn-print:hover{background:#e8eef2}

/* EDITOR */
.editor{max-width:920px;margin:20px auto;padding:0 14px 80px}
.card{background:#fff;border:0.5px solid var(--border);border-radius:10px;padding:18px 22px;margin-bottom:14px}
.card-title{font-size:11px;font-weight:600;color:var(--teal);letter-spacing:.1em;text-transform:uppercase;padding-bottom:10px;margin-bottom:14px;border-bottom:1px solid var(--teal-light);display:flex;align-items:center;gap:7px}
.card-title::before{content:'';width:3px;height:13px;background:var(--teal);border-radius:2px;display:inline-block}

/* FIELDS */
.fg{display:grid;gap:10px}
.fg-2{grid-template-columns:1fr 1fr}
.fg-3{grid-template-columns:1fr 1fr 1fr}
.fg-4{grid-template-columns:1fr 1fr 1fr 1fr}
.field label{display:block;font-size:11px;font-weight:600;color:var(--text-muted);margin-bottom:4px;letter-spacing:.03em}
.field input,.field select,.field textarea{width:100%;font-size:13px;font-family:inherit;color:var(--text);background:var(--gray-light);border:1px solid var(--border);border-radius:6px;padding:7px 10px;transition:border-color .15s,background .15s}
.field input:focus,.field select:focus,.field textarea:focus{outline:none;border-color:var(--teal-mid);background:#fff}
.field textarea{resize:vertical;min-height:72px;line-height:1.55}
.radio-row{display:flex;flex-wrap:wrap;gap:6px 14px;margin-top:4px}
.radio-row label{display:flex;align-items:center;gap:5px;font-size:13px;cursor:pointer}
.radio-row input{accent-color:var(--teal)}

/* ORGAN SYSTEM HEADERS */
.sys-block{margin-bottom:20px;border-radius:10px;overflow:hidden;border:1.5px solid var(--border);background:#fff}
.sys-header{display:flex;align-items:center;gap:9px;padding:10px 16px;font-size:12px;font-weight:700;letter-spacing:.08em;color:#fff;background:var(--sys-color,var(--teal))}
.sys-icon{font-size:15px;line-height:1}
.sys-grid{display:grid;grid-template-columns:1fr 1fr;gap:0;padding:0}
.sys-grid .organ-card{border:none;border-right:1px solid var(--border);border-bottom:1px solid var(--border);border-radius:0}
.sys-grid .organ-card:nth-child(even){border-right:none}
.sys-grid .organ-card:last-child{border-bottom:none}
.sys-grid .organ-card:nth-last-child(2):nth-child(odd){border-bottom:none}
/* single organ full-width */
.sys-grid.solo .organ-card{grid-column:1/-1;border-right:none;border-bottom:none}

/* ORGAN GRID (standalone, kept for compat) */
.organ-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.organ-card{border:1px solid var(--border);border-radius:8px;overflow:hidden}
.organ-header{display:flex;align-items:center;gap:8px;padding:8px 13px;background:var(--gray-light);border-bottom:1px solid var(--border)}
.organ-dot{width:9px;height:9px;border-radius:50%;flex-shrink:0}
.organ-label{font-size:13px;font-weight:600}
.organ-body{padding:11px 13px}
.organ-body textarea{width:100%;font-size:13px;font-family:inherit;color:var(--text);background:var(--gray-light);border:1px solid var(--border);border-radius:6px;padding:7px 10px;resize:vertical;min-height:66px;line-height:1.5;margin-bottom:8px}
.organ-body textarea:focus{outline:none;border-color:var(--teal-mid);background:#fff}

/* MEDIA UPLOAD */
.media-zone{border:1.5px dashed var(--border);border-radius:6px;padding:8px 10px;text-align:center;cursor:pointer;transition:border-color .15s,background .15s;font-size:11px;color:var(--text-muted)}
.media-zone:hover{border-color:var(--teal-mid);background:var(--teal-light)}
.media-zone input{display:none}
.media-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:7px}

/* MEDIA CARD */
.media-card{border:1px solid var(--border);border-radius:8px;overflow:hidden;background:var(--gray-light)}
.media-card:hover{border-color:var(--teal-mid)}
.media-preview{position:relative;width:100%;aspect-ratio:4/3;background:#111;cursor:pointer;overflow:hidden}
.media-preview img,.media-preview video{width:100%;height:100%;object-fit:cover;display:block}
.media-preview .badge{position:absolute;bottom:5px;left:5px;background:rgba(0,0,0,.65);color:#fff;font-size:9px;border-radius:3px;padding:2px 6px}
.media-preview .annotated-badge{position:absolute;top:5px;left:5px;background:rgba(43,125,184,.85);color:#fff;font-size:9px;border-radius:3px;padding:2px 6px}
.media-card-body{padding:6px 8px}
.media-note{width:100%;font-size:12px;font-family:inherit;color:var(--text);background:#fff;border:1px solid var(--border);border-radius:5px;padding:5px 8px;resize:vertical;min-height:44px;line-height:1.5}
.media-note:focus{outline:none;border-color:var(--teal-mid)}
.media-card-actions{display:flex;gap:5px;margin-top:5px;flex-wrap:wrap}
.mr-btn{font-size:11px;padding:3px 9px;border-radius:4px;border:1px solid var(--border);background:#fff;color:var(--text-muted);cursor:pointer;font-family:inherit;transition:background .12s}
.mr-btn:hover{background:var(--teal-light);border-color:var(--teal-mid);color:var(--teal)}
.mr-btn.del{color:var(--red);border-color:#e0c0c0}
.mr-btn.del:hover{background:#fdf0f0}

/* LOGO / PHOTO ZONES */
.logo-zone{width:82px;height:82px;border:1.5px dashed var(--border);border-radius:8px;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;overflow:hidden;background:var(--gray-light)}
.logo-zone img{width:100%;height:100%;object-fit:contain}
.logo-zone input{display:none}
.animal-zone{width:100px;height:100px;border:1.5px dashed var(--border);border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0;overflow:hidden;background:var(--gray-light)}
.animal-zone img{width:100%;height:100%;object-fit:cover}
.animal-zone input{display:none}
.zone-ph{font-size:10px;color:var(--text-muted);text-align:center;padding:6px;line-height:1.4}

/* DIAGNOSIS */
.diag-list{list-style:none;counter-reset:diag}
.diag-list li{counter-increment:diag;display:flex;gap:10px;align-items:flex-start;margin-bottom:10px}
.diag-list li::before{content:counter(diag);min-width:22px;height:22px;background:var(--teal);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;flex-shrink:0;margin-top:2px}
.diag-text{flex:1}
.diag-main{width:100%;font-size:13px;font-weight:600;border:none;border-bottom:1px solid #ccc;padding:3px 0;background:transparent;margin-bottom:4px;font-family:inherit;color:var(--text)}
.diag-main:focus{outline:none;border-bottom-color:var(--teal)}
.diag-sub{width:100%;font-size:12px;border:1px solid #e0e0e0;border-radius:5px;padding:5px 8px;min-height:48px;resize:vertical;background:#fafaf8;font-family:inherit;line-height:1.5;color:#5F5E5A}
.diag-sub:focus{outline:none;border-color:var(--teal-mid)}
.rm-btn{background:none;border:none;color:var(--red);font-size:14px;cursor:pointer;opacity:.55;padding:0 3px;margin-top:3px}
.rm-btn:hover{opacity:1}
.add-diag-btn{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--teal);background:var(--teal-light);border:1px solid var(--teal-mid);border-radius:6px;padding:6px 14px;cursor:pointer;font-family:inherit;margin-top:6px}
.add-diag-btn:hover{background:#d4dfe6}

/* SIG */
.sig-line{border:none;border-bottom:1px solid #ccc;padding:4px 0;font-size:13px;width:100%;background:transparent;font-family:inherit;color:var(--text)}
.sig-line:focus{outline:none;border-bottom-color:var(--teal)}

/* ─── AI MODAL ─── */
#ai-overlay{position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:800;display:none;align-items:center;justify-content:center}
#ai-overlay.open{display:flex}
#ai-box{background:#fff;border-radius:12px;overflow:hidden;width:480px;max-width:94vw;box-shadow:0 8px 40px rgba(0,0,0,.25)}
#ai-header{background:var(--teal);padding:12px 18px;display:flex;align-items:center;justify-content:space-between}
#ai-header span{color:#fff;font-size:14px;font-weight:600}
#ai-close-btn{background:none;border:none;color:rgba(255,255,255,.7);font-size:18px;cursor:pointer;line-height:1;padding:0 4px}
#ai-close-btn:hover{color:#fff}
#ai-body{padding:20px 22px}
#ai-api-row{display:flex;gap:8px;margin-bottom:14px}
#ai-api-row input{flex:1;font-size:12px;font-family:inherit;background:var(--gray-light);border:1px solid var(--border);border-radius:6px;padding:7px 10px;color:var(--text)}
#ai-api-row input:focus{outline:none;border-color:var(--teal-mid);background:#fff}
#ai-log{font-size:12px;color:var(--text-muted);min-height:44px;line-height:1.7;padding:8px 0}
#ai-progress-bar-wrap{height:4px;background:var(--teal-light);border-radius:2px;overflow:hidden;margin-bottom:8px}
#ai-progress-bar{height:100%;background:var(--teal);width:0%;transition:width .3s;border-radius:2px}
#ai-footer{padding:12px 22px 18px;display:flex;justify-content:flex-end;gap:8px}
.ai-btn{padding:8px 20px;border-radius:7px;font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;border:1px solid var(--border);background:var(--gray-light);color:var(--text);transition:background .15s}
.ai-btn:hover{background:#e4e0db}
.ai-btn.primary{background:var(--teal);border-color:var(--teal);color:#fff}
.ai-btn.primary:hover{background:var(--teal-mid)}
.ai-btn:disabled{opacity:.45;cursor:not-allowed}
.btn-ai{background:rgba(255,255,255,.15);border-color:rgba(255,255,255,.4);color:#fff}
.btn-ai:hover{background:rgba(255,255,255,.28)}

/* ─── VIDEO PLAYER MODAL ─── */
#vid-overlay{position:fixed;inset:0;background:rgba(0,0,0,.85);z-index:900;display:none;align-items:center;justify-content:center;flex-direction:column}
#vid-overlay.open{display:flex}
#vid-box{background:#1a1a1a;border-radius:10px;overflow:hidden;max-width:92vw;width:720px;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.7)}
#vid-header{background:#222;padding:8px 14px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid #333}
#vid-header span{font-size:12px;color:#ccc}
#vid-close{background:none;border:none;color:#aaa;font-size:18px;cursor:pointer;line-height:1;padding:0 4px}
#vid-close:hover{color:#fff}
#vid-wrap{background:#000;display:flex;align-items:center;justify-content:center;min-height:200px;position:relative}
#vid-wrap video{max-width:100%;max-height:65vh;display:block}
#vid-controls{background:#222;padding:10px 14px;border-top:1px solid #333}
#vid-progress{width:100%;height:5px;accent-color:var(--teal-mid);cursor:pointer;margin-bottom:10px;display:block}
.vid-ctrl-row{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
.vid-btn{padding:5px 12px;border-radius:5px;border:1px solid #444;background:#333;color:#ccc;font-size:12px;cursor:pointer;font-family:inherit;transition:background .12s}
.vid-btn:hover{background:#444}
.vid-btn.active{background:var(--teal);border-color:var(--teal-mid);color:#fff}
#vid-time{font-size:11px;color:#aaa;min-width:80px}
#vid-vol{width:60px;accent-color:var(--teal-mid)}
.vid-sep{width:1px;height:20px;background:#444}
#vid-footer{background:#222;padding:8px 14px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #333}
.vid-snap-strip{display:flex;flex-wrap:wrap;gap:5px;margin-top:8px}
.snap-thumb{position:relative;width:60px;height:60px;border-radius:4px;overflow:hidden;border:1px solid #444;cursor:pointer;flex-shrink:0}
.snap-thumb img{width:100%;height:100%;object-fit:cover}
.snap-thumb .snap-del{position:absolute;top:1px;right:1px;background:rgba(180,0,0,.8);color:#fff;border:none;border-radius:2px;font-size:8px;padding:1px 4px;cursor:pointer;display:none}
.snap-thumb:hover .snap-del{display:block}
.snap-thumb .snap-sel{position:absolute;bottom:1px;left:1px;background:rgba(15,110,86,.85);color:#fff;border:none;border-radius:2px;font-size:8px;padding:1px 4px;cursor:pointer}
.snap-thumb.selected{border:2px solid var(--teal-mid)}

/* PRINT: hide video, show snapshot cover */
@media print{
  .media-thumb video{display:none!important}
  .media-thumb .vid-print-snap{display:block!important;width:100%;height:100%;object-fit:cover}
}
.vid-print-snap{display:none}

/* ─── ANNOTATION MODAL ─── */
#modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.72);z-index:1000;display:none;align-items:center;justify-content:center;flex-direction:column}
#modal-overlay.open{display:flex}
#modal-box{background:#1a1a1a;border-radius:10px;overflow:hidden;max-width:96vw;max-height:96vh;display:flex;flex-direction:column;box-shadow:0 8px 40px rgba(0,0,0,.6)}
#modal-toolbar{background:#222;padding:8px 12px;display:flex;align-items:center;gap:6px;flex-wrap:wrap;border-bottom:1px solid #333}
.tool-btn{padding:5px 12px;border-radius:5px;border:1px solid #444;background:#333;color:#ccc;font-size:12px;cursor:pointer;font-family:inherit;transition:background .12s}
.tool-btn:hover{background:#444}
.tool-btn.active{background:var(--teal);border-color:var(--teal-mid);color:#fff}
.tool-sep{width:1px;height:22px;background:#444;margin:0 4px}
#color-btn{width:26px;height:26px;border-radius:50%;border:2px solid #666;cursor:pointer;padding:0}
#modal-canvas-wrap{overflow:auto;flex:1;display:flex;align-items:flex-start;justify-content:center;padding:10px;background:#111}
#anno-canvas{cursor:crosshair;display:block}
#modal-footer{background:#222;padding:8px 12px;display:flex;justify-content:flex-end;gap:8px;border-top:1px solid #333}
.mf-btn{padding:6px 18px;border-radius:6px;border:1px solid #555;background:#333;color:#ccc;font-size:13px;cursor:pointer;font-family:inherit}
.mf-btn.ok{background:var(--teal);border-color:var(--teal-mid);color:#fff}
.mf-btn:hover{opacity:.85}
.stroke-slider{width:70px;accent-color:var(--teal-mid)}
#text-input-wrap{display:none;position:absolute;z-index:1100}
#text-input-wrap input{font-size:15px;padding:4px 8px;border:2px solid var(--teal-mid);border-radius:4px;background:rgba(0,0,0,.7);color:#fff;font-family:inherit;min-width:120px}

/* PRINT COVER */
.print-cover{display:none}
#print-logo:not(.has-logo){display:none}
#print-photo:not(.has-photo){display:none}
@media print{
  @page{size:A4;margin:12mm 12mm 12mm 12mm}
  body{background:#fff;font-size:10px}
  .editor{max-width:none;margin:0;padding:0}
  .card{border:1px solid #ccc;border-radius:5px;padding:7px 10px;margin-bottom:6px;break-inside:auto}
  .card-title{font-size:9px;padding-bottom:5px;margin-bottom:7px}
  .field{margin-bottom:0}
  .field label{font-size:9px;margin-bottom:1px}
  .field input,.field select,.field textarea,.organ-body textarea,.diag-main,.diag-sub,.sig-line{background:transparent!important;border:none!important;border-bottom:0.5px solid #ccc!important;border-radius:0!important;padding:1px 0!important;font-size:10px!important;resize:none!important;min-height:0!important}
  .field textarea{min-height:0!important;height:auto!important;overflow:visible!important}
  .organ-body textarea{min-height:0!important;height:auto!important;overflow:visible!important}
  .fg{gap:6px}
  .animal-zone{display:none!important}
  .organ-card{border:1px solid #ccc;border-radius:4px;break-inside:avoid}
  .organ-header{background:#f5f5f5!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;padding:3px 8px}
  .organ-label{font-size:10px}
  .organ-body{padding:5px 8px}
  .media-zone{display:none!important}
  .media-grid{display:grid!important;grid-template-columns:1fr 1fr;gap:5px}
  .media-card{border:0.5px solid #ccc;border-radius:4px;overflow:hidden}
  .media-preview{aspect-ratio:4/3}
  .media-card-body{padding:3px 5px}
  .media-note{font-size:9px!important;min-height:0!important;border:none!important;background:transparent!important;padding:0!important}
  .media-card-actions{display:none!important}
  .media-preview .badge{display:none!important}
  .media-preview .annotated-badge{display:none!important}
  .radio-row{gap:4px 10px}
  .radio-row label{font-size:10px}
  #organ-grid{display:block!important}
  .sys-block{display:block!important;margin-bottom:6px;border:1px solid #ccc;border-radius:5px;overflow:hidden;break-inside:auto}
  .sys-header{display:flex!important;padding:5px 10px;font-size:9px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .sys-grid{display:grid!important;grid-template-columns:1fr 1fr;gap:0;padding:0}
  .sys-grid.solo .organ-card{grid-column:1/-1}
  .fg-2{grid-template-columns:1fr 1fr}
  .fg-3{grid-template-columns:1fr 1fr 1fr}
  .fg-4{grid-template-columns:1fr 1fr 1fr 1fr}
  .diag-list li{margin-bottom:6px}
  .diag-list li::before{min-width:16px;height:16px;font-size:9px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .diag-main{font-size:10px!important}
  .diag-sub{font-size:9px!important;min-height:0!important;padding:2px 4px!important}
  .add-diag-btn,.rm-btn{display:none}
  .print-cover{display:block;margin-bottom:10px;border:1.5px solid var(--teal);border-radius:6px;overflow:hidden;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pc-top-bar{background:var(--teal)!important;display:flex;align-items:center;gap:12px;padding:8px 14px;-webkit-print-color-adjust:exact;print-color-adjust:exact}
  .pc-logo{width:38px;height:38px;object-fit:contain;border-radius:4px;background:#fff;flex-shrink:0}
  .pc-report-title{color:#fff!important;flex:1;text-align:center}
  .pc-main-title{font-size:20px;font-weight:700;letter-spacing:.06em;text-align:center}
  .pc-en-title{font-size:10px;opacity:.85;margin-top:2px;text-align:center}
  .pc-body{display:flex;gap:0}
  .pc-clinic-col{padding:8px 12px;width:44%;flex-shrink:0}
  .pc-clinic-name{font-size:11px;font-weight:700;color:var(--teal);margin-bottom:4px}
  .pc-clinic-row{font-size:9px;color:#555;margin-bottom:2px;line-height:1.4}
  .pc-divider{width:1px;background:#e0ddd8;flex-shrink:0;margin:8px 0}
  .pc-patient-col{flex:1;padding:8px 12px;display:flex;gap:10px;align-items:flex-start}
  .pc-photo{width:50px;height:50px;border-radius:50%;object-fit:cover;border:1.5px solid var(--border);flex-shrink:0}
  .pc-table{border-collapse:collapse;font-size:9px;width:100%}
  .pc-td-label{color:#888;padding:2px 5px 2px 0;white-space:nowrap;font-weight:600;letter-spacing:.03em;width:18%}
  .pc-td-val{color:#2C2C2A;padding:2px 8px 2px 0;border-bottom:0.5px solid #e0ddd8}
}
@media(max-width:620px){.organ-grid{grid-template-columns:1fr}.fg-3,.fg-4{grid-template-columns:1fr 1fr}}
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar screen-only">
  <h1>🔬 腹腔超音波報告</h1>
  <div class="top-bar-btns">
    <span id="save-status" style="font-size:11px;opacity:.7;align-self:center"></span>
    <button class="btn" onclick="clearAll()">清除</button>
    <label class="btn screen-only" title="載入 JSON 存檔">📂 載入
      <input type="file" id="load-json-inp" accept=".json" style="display:none" onchange="loadFromJSON(this)">
    </label>
    <button class="btn btn-save screen-only" onclick="saveToJSON()">💾 存檔 JSON</button>
    <button class="btn btn-ai screen-only" onclick="openAiModal()">✨ AI 補全</button>
    <button class="btn btn-print" onclick="window.print()">列印 / 儲存 PDF</button>
  </div>
</div>

<!-- AI MODAL -->
<div id="ai-overlay">
  <div id="ai-box">
    <div id="ai-header">
      <span>✨ AI 一鍵補全超音波描述</span>
      <button id="ai-close-btn" onclick="closeAiModal()">✕</button>
    </div>
    <div id="ai-body">
      <div id="ai-api-row">

function selectClinic(val){
  const info = CLINICS[val];
  if(info){
    document.getElementById('clinic-addr').value = info.addr;
    document.getElementById('doctor').value       = info.doctor;
    // apply logo
    const logoImg = document.getElementById('logo-img');
    const logoPh  = document.getElementById('logo-ph');
    const printLogo = document.getElementById('print-logo');
    if(info.logo){
      logoImg.src = info.logo; logoImg.style.display='block';
      logoPh.style.display='none';
      printLogo.src = info.logo; printLogo.classList.add('has-logo');
    }
  } else {
    document.getElementById('clinic-addr').value = '';
    document.getElementById('doctor').value       = '';
  }
  syncCover();
}

/* Build organ cards grouped by system */
function buildOrgans(){
  const container = document.getElementById('organ-grid');
  container.style.display = 'block';
  SYSTEMS.forEach(sys=>{
    const block = document.createElement('div');
    block.className = 'sys-block';

    // System header
    const header = document.createElement('div');
    header.className = 'sys-header';
    header.style.setProperty('--sys-color', sys.color);
    header.style.background = sys.color;
    header.innerHTML = `<span class="sys-icon">${sys.icon}</span><span>${sys.label}</span>`;
    block.appendChild(header);

    // Organs grid
    const grid = document.createElement('div');
    grid.className = 'sys-grid' + (sys.organs.length === 1 ? ' solo' : '');
    sys.organs.forEach(o=>{
      const card = document.createElement('div');
      card.className = 'organ-card';
      card.innerHTML = `
        <div class="organ-header">
          <span class="organ-dot" style="background:${sys.color}"></span>
          <span class="organ-label">${o.label}</span>
        </div>
        <div class="organ-body">
          <textarea data-organ="${o.id}" placeholder="${o.ph}"></textarea>
          <div class="media-zone screen-only" onclick="triggerMedia('${o.id}')">
            <input type="file" id="inp-${o.id}" accept="image/*,video/*" multiple onchange="handleFiles(this,'${o.id}')">
            📎 點擊上傳影像 / 影片（可多張）
          </div>
          <div class="media-grid" id="grid-${o.id}"></div>
        </div>`;
      grid.appendChild(card);
    });
    block.appendChild(grid);
    container.appendChild(block);
  });
}
buildOrgans();

function triggerMedia(id){ document.getElementById('inp-'+id).click(); }

/* ═══════════════════════════════════
   MEDIA HANDLING
═══════════════════════════════════ */
// mediaStore: { organId: [ {type:'image'|'video', origSrc, annotatedSrc|null, el} ] }
const mediaStore = {};

function handleFiles(input, organId){
  if(!mediaStore[organId]) mediaStore[organId]=[];
  Array.from(input.files).forEach(file=>{
    const url = URL.createObjectURL(file);
    const isVideo = file.type.startsWith('video/');
    const item = {type: isVideo?'video':'image', origSrc:url, annotatedSrc:null};
    mediaStore[organId].push(item);
    renderThumb(organId, mediaStore[organId].length-1, item);
  });
  input.value='';
}

function renderThumb(organId, idx, item){
  const grid = document.getElementById('grid-'+organId);
  const card = document.createElement('div');
  card.className = 'media-card';
  card.dataset.idx = idx;
  card.dataset.organ = organId;

  // Preview area
  const preview = document.createElement('div');
  preview.className = 'media-preview';

  if(item.type==='video'){
    const vid = document.createElement('video');
    vid.src = item.origSrc;
    vid.muted = true;
    vid.playsInline = true;
    vid.preload = 'metadata';
    preview.addEventListener('mouseenter',()=>vid.play());
    preview.addEventListener('mouseleave',()=>{vid.pause();vid.currentTime=0;});
    preview.appendChild(vid);
    item.el = vid;
    const snapImg = document.createElement('img');
    snapImg.className = 'vid-print-snap';
    preview.appendChild(snapImg);
    item.printSnapEl = snapImg;
    const badge = document.createElement('div');
    badge.className='badge'; badge.textContent='▶ 影片';
    preview.appendChild(badge);
    preview.style.cursor='pointer';
    preview.onclick = ()=>openVidModal(organId, idx);
  } else {
    const img = document.createElement('img');
    img.src = item.annotatedSrc || item.origSrc;
    preview.appendChild(img);
    item.el = img;
    preview.style.cursor='pointer';
    preview.onclick = ()=>openAnnotator(organId, idx);
    if(item.annotatedSrc){
      const ab=document.createElement('div');
      ab.className='annotated-badge'; ab.textContent='✓標';
      preview.appendChild(ab);
    }
  }
  card.appendChild(preview);

  // Card body: note + actions
  const body = document.createElement('div');
  body.className = 'media-card-body';

  const note = document.createElement('textarea');
  note.className = 'media-note';
  note.placeholder = '備註（選填）…';
  note.value = item.note || '';
  note.oninput = ()=>{ item.note = note.value; };
  body.appendChild(note);

  const actions = document.createElement('div');
  actions.className = 'media-card-actions screen-only';

  if(item.type==='image'){
    const editBtn = document.createElement('button');
    editBtn.className='mr-btn'; editBtn.textContent='✏ 標註';
    editBtn.onclick = ()=>openAnnotator(organId, idx);
    actions.appendChild(editBtn);
  } else {
    const playBtn = document.createElement('button');
    playBtn.className='mr-btn'; playBtn.textContent='▶ 播放';
    playBtn.onclick = ()=>openVidModal(organId, idx);
    actions.appendChild(playBtn);
  }

  const delBtn = document.createElement('button');
  delBtn.className='mr-btn del'; delBtn.textContent='✕ 刪除';
  delBtn.onclick = ()=>{ mediaStore[organId].splice(idx,1); rebuildGrid(organId); };
  actions.appendChild(delBtn);

  body.appendChild(actions);
  card.appendChild(body);
  grid.appendChild(card);
}

function rebuildGrid(organId){
  const grid = document.getElementById('grid-'+organId);
  grid.innerHTML='';

function fmtTime(s){ const m=Math.floor(s/60); const ss=Math.floor(s%60); return m+':'+(ss<10?'0':'')+ss; }

function snapFrame(){
  const c=document.createElement('canvas');

function addSnapThumb(snap, i){
  const wrap=document.createElement('div');
  wrap.className='snap-thumb'+(snap.selected?' selected':'');
  wrap.dataset.i=i;
  const img=document.createElement('img'); img.src=snap.dataUrl;
  wrap.appendChild(img);
  const del=document.createElement('button'); del.className='snap-del'; del.textContent='✕';
  del.onclick=e=>{e.stopPropagation(); vidSnaps.splice(i,1); rebuildSnapStrip();};
  wrap.appendChild(del);
  const sel=document.createElement('button');
  sel.className='snap-sel'; sel.textContent=snap.selected?'✓選':'選';
  sel.onclick=e=>{
    e.stopPropagation();

    wrap.classList.toggle('selected',vidSnaps[i].selected);
    sel.textContent=vidSnaps[i].selected?'✓選':'選';
  };
  wrap.appendChild(sel);
  vidStrip.appendChild(wrap);
}

function rebuildSnapStrip(){
  vidStrip.innerHTML='';
  vidSnaps.forEach((s,i)=>addSnapThumb(s,i));

function saveVidSnaps(){
  if(!vidOrgan||vidIdx===null) return;
  const item=mediaStore[vidOrgan][vidIdx];
  item.snaps=vidSnaps.map(s=>({...s}));
  // set first selected snap as print cover
  const sel=vidSnaps.find(s=>s.selected);
  if(sel && item.printSnapEl){
    item.printSnapEl.src=sel.dataUrl;
  }
  // also add selected snaps as new image items in the same organ grid
  const selected=vidSnaps.filter(s=>s.selected);
  selected.forEach(s=>{
    const newItem={type:'image',origSrc:s.dataUrl,annotatedSrc:null};
    if(!mediaStore[vidOrgan]) mediaStore[vidOrgan]=[];
    mediaStore[vidOrgan].push(newItem);
    renderThumb(vidOrgan, mediaStore[vidOrgan].length-1, newItem);

}

/* ═══════════════════════════════════
   ANNOTATION ENGINE
═══════════════════════════════════ */
let currentOrgan=null, currentIdx=null;
let tool='arrow', strokeColor='#FFD700', strokeW=3;
let isDrawing=false, startX=0, startY=0;
let annotations=[]; // array of shape objects
let snapshotBeforeDraw=null; // ImageData for live preview
let freePoints=[];

const canvas = document.getElementById('anno-canvas');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('modal-overlay');
const strokeLabel = document.getElementById('stroke-label');

document.getElementById('stroke-width').oninput = function(){
  strokeW = parseInt(this.value); strokeLabel.textContent=strokeW;
};
document.getElementById('color-btn').oninput = function(){ strokeColor=this.value; };

function setTool(t){
  tool=t;
  document.querySelectorAll('.tool-btn[id^=tool-]').forEach(b=>b.classList.remove('active'));
  document.getElementById('tool-'+t).classList.add('active');

}

function openAnnotator(organId, idx){
  currentOrgan=organId; currentIdx=idx;
  annotations=[];
  const item = mediaStore[organId][idx];
  const src = item.origSrc; // always annotate from original

  const img = new Image();
  img.onload=()=>{
    const maxW = Math.min(window.innerWidth*0.9, 1000);
    const maxH = window.innerHeight*0.75;
    const scale = Math.min(maxW/img.width, maxH/img.height, 1);
    canvas.width = Math.round(img.width*scale);
    canvas.height = Math.round(img.height*scale);
    ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
    snapshotBeforeDraw = ctx.getImageData(0,0,canvas.width,canvas.height);
    overlay.classList.add('open');
    // if already has annotation, draw it as base
    if(item.annotatedSrc){
      const ai=new Image();
      ai.onload=()=>{ctx.drawImage(ai,0,0,canvas.width,canvas.height);snapshotBeforeDraw=ctx.getImageData(0,0,canvas.width,canvas.height);};
      ai.src=item.annotatedSrc;
    }
  };
  img.src=src;
}

function closeModal(save){

  if(save && currentOrgan!==null){
    const item = mediaStore[currentOrgan][currentIdx];

    item.el.src = item.annotatedSrc;
    // update annotated badge on preview

        preview.appendChild(b);
      }
    }
    autoSave();
  }
  currentOrgan=null; currentIdx=null;
}

function getPos(e){
  const r=canvas.getBoundingClientRect();
  const src=e.touches?e.touches[0]:e;
  return {x:src.clientX-r.left, y:src.clientY-r.top};
}

// Drawing
canvas.addEventListener('mousedown', startDraw);
canvas.addEventListener('mousemove', moveDraw);
canvas.addEventListener('mouseup', endDraw);
canvas.addEventListener('touchstart', e=>{e.preventDefault();startDraw(e);},{passive:false});
canvas.addEventListener('touchmove', e=>{e.preventDefault();moveDraw(e);},{passive:false});
canvas.addEventListener('touchend', e=>{e.preventDefault();endDraw(e);},{passive:false});

function startDraw(e){
  const {x,y}=getPos(e);
  if(tool==='text'){ placeTextInput(x,y); return; }
  isDrawing=true; startX=x; startY=y;
  if(tool==='freehand'){ freePoints=[{x,y}]; }
  snapshotBeforeDraw = ctx.getImageData(0,0,canvas.width,canvas.height);
}
function moveDraw(e){
  if(!isDrawing) return;
  const {x,y}=getPos(e);
  ctx.putImageData(snapshotBeforeDraw,0,0);
  drawShape(tool, startX,startY,x,y, freePoints, false);
  if(tool==='freehand') freePoints.push({x,y});
}
function endDraw(e){
  if(!isDrawing) return;
  isDrawing=false;
  const {x,y}=getPos(e)||{x:startX,y:startY};
  ctx.putImageData(snapshotBeforeDraw,0,0);
  drawShape(tool, startX,startY,x,y, freePoints, true);
  snapshotBeforeDraw = ctx.getImageData(0,0,canvas.width,canvas.height);
  annotations.push({tool,startX,startY,endX:x,endY:y,color:strokeColor,w:strokeW,pts:[...freePoints]});
  freePoints=[];
}

function drawShape(t,x1,y1,x2,y2,pts,final){
  ctx.strokeStyle=strokeColor; ctx.lineWidth=strokeW; ctx.lineCap='round'; ctx.lineJoin='round';
  if(t==='arrow'){
    const angle=Math.atan2(y2-y1,x2-x1);
    const al=Math.max(16, strokeW*4);
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(x2,y2);
    ctx.lineTo(x2-al*Math.cos(angle-Math.PI/7),y2-al*Math.sin(angle-Math.PI/7));
    ctx.lineTo(x2-al*Math.cos(angle+Math.PI/7),y2-al*Math.sin(angle+Math.PI/7));
    ctx.closePath(); ctx.fillStyle=strokeColor; ctx.fill();
  } else if(t==='circle'){
    const rx=Math.abs(x2-x1)/2, ry=Math.abs(y2-y1)/2;
    const cx=(x1+x2)/2, cy=(y1+y2)/2;
    ctx.beginPath(); ctx.ellipse(cx,cy,rx||2,ry||2,0,0,Math.PI*2); ctx.stroke();
  } else if(t==='rect'){
    ctx.beginPath(); ctx.strokeRect(x1,y1,x2-x1,y2-y1);
  } else if(t==='line'){
    ctx.beginPath(); ctx.moveTo(x1,y1); ctx.lineTo(x2,y2); ctx.stroke();
  } else if(t==='freehand'){
    if(pts.length<2) return;
    ctx.beginPath(); ctx.moveTo(pts[0].x,pts[0].y);
    for(let i=1;i<pts.length;i++) ctx.lineTo(pts[i].x,pts[i].y);
    ctx.stroke();
  }
}

function undoAnnotation(){
  annotations.pop();
  // redraw all from scratch - we need base image
  const item=mediaStore[currentOrgan][currentIdx];
  const base=new Image();
  base.onload=()=>{
    ctx.clearRect(0,0,canvas.width,canvas.height);
    ctx.drawImage(base,0,0,canvas.width,canvas.height);
    annotations.forEach(a=>{
      ctx.strokeStyle=a.color; ctx.lineWidth=a.w; ctx.lineCap='round'; ctx.lineJoin='round';
      drawShape(a.tool,a.startX,a.startY,a.endX,a.endY,a.pts,true);
      if(a.tool==='text'){
        ctx.font=`${a.fontSize||18}px sans-serif`;
        ctx.fillStyle=a.color;
        ctx.fillText(a.text,a.startX,a.startY);
      }
    });
    snapshotBeforeDraw=ctx.getImageData(0,0,canvas.width,canvas.height);
  };
  base.src=item.annotatedSrc||item.origSrc;
}

function clearAnnotations(){
  annotations=[];
  const item=mediaStore[currentOrgan][currentIdx];
  const base=new Image();
  base.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(base,0,0,canvas.width,canvas.height);snapshotBeforeDraw=ctx.getImageData(0,0,canvas.width,canvas.height);};
  base.src=item.origSrc;
}

// TEXT tool
let textPos={x:0,y:0};
const textWrap=document.getElementById('text-input-wrap');
const textInp=document.getElementById('anno-text-input');

function placeTextInput(x,y){
  textPos={x,y};
  const rect=canvas.getBoundingClientRect();
  textWrap.style.display='block';
  textWrap.style.left=(rect.left+x)+'px';
  textWrap.style.top=(rect.top+y-28)+'px';
  textInp.value='';

}
function hideTextInput(){ textWrap.style.display='none'; }
textInp.addEventListener('keydown',e=>{
  if(e.key==='Enter'){
    const txt=textInp.value.trim();
    if(txt){
      const fs=Math.max(14,strokeW*5);
      ctx.font=`bold ${fs}px sans-serif`;
      ctx.fillStyle=strokeColor;
      ctx.strokeStyle='rgba(0,0,0,0.6)'; ctx.lineWidth=strokeW*0.4;
      ctx.strokeText(txt,textPos.x,textPos.y);
      ctx.fillText(txt,textPos.x,textPos.y);
      annotations.push({tool:'text',startX:textPos.x,startY:textPos.y,text:txt,color:strokeColor,fontSize:fs});
      snapshotBeforeDraw=ctx.getImageData(0,0,canvas.width,canvas.height);
    }
    hideTextInput();
  }
  if(e.key==='Escape') hideTextInput();
});

function collectFormData(){
  const data = { _version: 3, _saved: new Date().toISOString() };
  document.querySelectorAll('input[type=text],input[type=number],input[type=date],textarea').forEach(el=>{
    if(el.id) data[el.id] = el.value;
  });
  document.querySelectorAll('select').forEach(el=>{ if(el.id) data[el.id]=el.value; });
  document.querySelectorAll('input[type=radio]:checked').forEach(el=>{ data['radio_'+el.name]=el.value; });
  document.querySelectorAll('textarea[data-organ]').forEach(el=>{
    data['organ_'+el.dataset.organ] = el.value;
  });
  // media notes
  const mediaNotes = {};
  Object.keys(mediaStore).forEach(orgId=>{
    mediaNotes[orgId] = (mediaStore[orgId]||[]).map(item=>({note: item.note||'', type: item.type}));
  });
  data['__mediaNotes'] = mediaNotes;
  // diagnosis
  const diags = [];
  document.querySelectorAll('#diag-list li').forEach(li=>{
    diags.push({ main: li.querySelector('.diag-main')?.value||'', sub: li.querySelector('.diag-sub')?.value||'' });
  });
  data['__diags'] = diags;
  return data;
}

function saveToJSON(){
  const data = collectFormData();
  const petName = document.getElementById('pet-name').value || '報告';
  const examDate = document.getElementById('exam-date').value || new Date().toISOString().slice(0,10);
  const filename = `腹腔超音波_${petName}_${examDate}.json`;
  const blob = new Blob([JSON.stringify(data, null, 2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
  const st = document.getElementById('save-status');
  st.textContent = '✓ 已下載 '+filename;
  setTimeout(()=>{ st.textContent=''; }, 4000);
}

function loadFromJSON(input){
  const file = input.files[0];
  if(!file) return;
  const reader = new FileReader();
  reader.onload = e=>{
    try{
      const data = JSON.parse(e.target.result);
      // restore fields
      Object.keys(data).forEach(k=>{
        if(k.startsWith('_')||k.startsWith('radio_')||k.startsWith('organ_')||k.startsWith('__')) return;
        const el = document.getElementById(k);
        if(el) el.value = data[k];
      });
      Object.keys(data).forEach(k=>{
        if(!k.startsWith('radio_')) return;
        const name = k.replace('radio_','');
        const el = document.querySelector(`input[type=radio][name="${name}"][value="${data[k]}"]`);
        if(el) el.checked = true;
      });
      Object.keys(data).forEach(k=>{
        if(!k.startsWith('organ_')) return;
        const orgId = k.replace('organ_','');
        const el = document.querySelector(`textarea[data-organ="${orgId}"]`);
        if(el) el.value = data[k];
      });
      if(data['__diags']&&data['__diags'].length){
        document.getElementById('diag-list').innerHTML='';
        diagN=0;
        data['__diags'].forEach(d=>{
          addDiag();
          const li=document.getElementById('diag-list').lastChild;
          li.querySelector('.diag-main').value=d.main;
          li.querySelector('.diag-sub').value=d.sub;
        });
      }
      syncCover();
      const st = document.getElementById('save-status');
      st.textContent = '✓ 已載入 '+file.name;
      setTimeout(()=>{ st.textContent=''; }, 4000);
    } catch(err){
      alert('載入失敗，請確認是正確的報告 JSON 檔。\n'+err.message);
    }
    input.value='';
  };
  reader.readAsText(file);
}

// ── submitToWorker ──────────────────────────────────────────
// Submits the full form data to the Cloudflare Worker API.
// Worker will queue the job for Hermes to process asynchronously.
async function submitToWorker() {
  const apiKey = document.getElementById('ai-api-key').value.trim();
  if (!apiKey) {
    // For v1, require the vet's API key (stored locally, not sent to Worker)
    // The Worker accepts observations for queueing only.
    alert('請輸入 API Key（用於本地驗證）');
    return;
  }

  const startBtn = document.getElementById('ai-start-btn');
  const logEl    = document.getElementById('ai-log');
  const bar      = document.getElementById('ai-progress-bar');
  const barWrap  = document.getElementById('ai-progress-bar-wrap');

  startBtn.disabled = true;
  barWrap.style.display = 'block';
  bar.style.width = '10%';
  logEl.innerHTML = '正在收集資料…';

  try {
    // ── Collect all form data ──
    const petName   = document.getElementById('pet-name').value.trim() || '（未填）';
    const species   = document.getElementById('species').value.trim()   || '（未填）';
    const breed     = document.getElementById('breed').value.trim()     || '';
    const age       = document.getElementById('age').value.trim()       || '';
    const gender    = document.getElementById('gender').value.trim()     || '';
    const weight    = document.getElementById('weight').value.trim()    || '';

    // Collect organ observations (only non-empty ones)
    const organNotes = [];
    document.querySelectorAll('textarea[data-organ]').forEach(ta => {
      const val = ta.value.trim();
      if (val) {
        let label = ta.dataset.organ;
        for (const sys of window.SYSTEMS || []) {
          const o = sys.organs.find(x => x.id === ta.dataset.organ);
          if (o) { label = o.label; break; }
        }
        organNotes.push({ organ: label, note: val });
      }
    });

    const observations = organNotes.map(o => `${o.organ}：${o.note}`).join('\n');

    bar.style.width = '40%';
    logEl.innerHTML = '正在提交至伺服器…';

    const payload = {
      petName,
      species,
      breed,
      age,
      gender,
      weight,
      ownerName: '（見報告）',   // TODO: add owner field to form if needed
      vetName:    '（見報告）',   // TODO: add vet signature field
      observations,
      organs:     organNotes.map(o => o.organ),
      submitTime: new Date().toISOString(),
    };

    if (!WORKER_URL) {
      throw new Error('WORKER_URL 未設定。請聯繫管理員配置 Worker URL。');
    }

    const response = await fetch(WORKER_URL + '/api/submit', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(payload),
    });

    bar.style.width = '90%';

    if (!response.ok) {
      const err = await response.json().catch(() => ({ error: 'Unknown error' }));
      throw new Error(err.error || `HTTP ${response.status}`);
    }

    bar.style.width = '100%';
    logEl.innerHTML = `✅ 報告已提交！<br>將在 5-10 分鐘內發送到獸醫郵箱。`;

  } catch (err) {
    logEl.innerHTML = `❌ 提交失敗：${err.message}`;
    startBtn.disabled = false;
    bar.style.width = '0%';
  }

  startBtn.disabled = false;
}

function clearAll(){
  if(!confirm('確定清除所有資料？')) return;
  document.querySelectorAll('input[type=text],input[type=number],input[type=date],select,textarea').forEach(el=>el.value='');
  document.querySelectorAll('input[type=radio]').forEach(el=>el.checked=false);
  Object.keys(mediaStore).forEach(k=>{mediaStore[k]=[];rebuildGrid(k);});
  document.getElementById('logo-img').style.display='none';
  document.getElementById('logo-ph').style.display='';
  document.getElementById('animal-img').style.display='none';
  document.getElementById('animal-ph').style.display='';
  document.getElementById('print-logo').src='';
  document.getElementById('print-logo').classList.remove('has-logo');
  document.getElementById('print-photo').src='';
  document.getElementById('print-photo').classList.remove('has-photo');
  document.getElementById('diag-list').innerHTML='';
  diagN=0; addDiag();
  document.getElementById('exam-date').valueAsDate=new Date();
  syncCover();
}
</script>
